name: Generate GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.GH_PAT }}
          user: SteOnChain
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/London
          config_theme: radical
          config_display: large
          repositories_affiliations: owner, collaborator, organization_member
          commits_authoring: steonchain@users.noreply.github.com, 113260454+SteOnChain@users.noreply.github.com, stvbrn@gmail.com, steven-blockgein3@users.noreply.github.com
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage
          plugin_trophies: yes
          plugin_trophies_theme: radical
